<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | C.O.R.E. SDN</title>
    <!-- Modular CSS -->
    <link rel="stylesheet" href="../public/css/global.css" />
    <link rel="stylesheet" href="../public/css/navigation.css" />
    <link rel="stylesheet" href="../public/css/forms.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar">
      <div class="logo">
        <a href="../index.html">
          <img src="https://cdn.corenexis.com/files/c/7677583720.png" alt="C.O.R.E. Logo" style="height: 80px" />
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="../index.html" class="btn-back">Back to Home</a></li>
        <li><a href="../index.html" class="btn-back">Back to Home</a></li>
      </ul>
    </nav>

    <div class="login-container">
      <h2 style="color: var(--dark-green); text-align: center; margin-bottom: 25px;">
        System Login
      </h2>
      <form id="loginForm">
        <div class="input-group">
          <label for="loginUser">Email / Username</label>
          <input type="text" id="loginUser" placeholder="Enter your username" required autocomplete="username" />
        </div>

        <div class="input-group">
          <label for="loginPass">Password</label>
          <input type="password" id="loginPass" placeholder="Enter your password" required autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-submit" style="margin-top: 35px;">
          Secure Login
        </button>
      </form>
    </div>

    <!-- Modular JS -->
    <script src="../public/js/utils.js"></script>
    <script src="../public/js/navigation.js"></script>
    <script src="../public/js/auth.js"></script>
  </body>
</html>
